<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TP Open House Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #dc2626;
      color: white;
      padding: 16px;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 12px;
      opacity: 0.9;
    }

    .chat-box {
      height: 450px;
      padding: 12px;
      overflow-y: auto;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 75%;
      font-size: 14px;
      white-space: normal;
      word-wrap: break-word;
    }

    .user {
      background: #dc2626;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: white;
      border: 1px solid #e5e7eb;
      align-self: flex-start;
    }

    .bot p {
      margin: 0.4em 0;
    }

    .bot ul,
    .bot ol {
      margin: 0.4em 0;
      padding-left: 20px;
    }

    .bot strong {
      font-weight: bold;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #e5e7eb;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      background: #dc2626;
      color: white;
      border: none;
      padding: 12px 16px;
      cursor: pointer;
    }

    button:hover {
      background: #b91c1c;
    }

    .typing {
      font-size: 12px;
      color: gray;
      padding: 0 12px 8px;
    }
  </style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    <h2>TP Open House Chatbot</h2>
    <p>Ask about TP CCAs</p>
  </div>

  <div id="chat" class="chat-box"></div>
  <div id="typing" class="typing"></div>

  <div class="input-area">
    <input
      id="input"
      type="text"
      placeholder="Ask something..."
    />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- Load markdown library FIRST -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  const chatBox = document.getElementById("chat");
  const input = document.getElementById("input");
  const typing = document.getElementById("typing");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("msg", type);

    if (type === "bot") {
      div.innerHTML = marked.parse(text);
    } else {
      div.innerText = text;
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function sendMessage() {
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    typing.innerText = "Bot is thinking...";

    try {
      const res = await fetch("https://tp-cca-chatbot.onrender.com/chat", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        message: message
    })
});

      const data = await res.json();

      typing.innerText = "";

      if (data.success) {
        addMessage(data.response, "bot");
      } else {
        addMessage(data.response || "Unknown error", "bot");
      }

    } catch (err) {
      typing.innerText = "";
      addMessage("Cannot connect to server 😢", "bot");
      console.error(err);
    }
  }

  input.addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });

  // Welcome message
  addMessage(
    "Hi! 👋 Ask me anything about **Temasek Polytechnic CCAs**!",
    "bot"
  );
</script>

</body>
</html>
